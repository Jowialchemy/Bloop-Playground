<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Bloop Playground</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:'Fredoka One', cursive;
    overflow:hidden;
    width:100%;
    height:100vh;
    background:
        radial-gradient(circle at top left, rgba(255,0,120,0.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(0,255,120,0.18), transparent 35%),
        linear-gradient(135deg,#050505,#111111,#071b07);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* HOME SCREEN */

#homeScreen{
    width:100%;
    max-width:430px;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:15px;
    position:relative;
}

/* LOGO */

.logo-container{
    margin-top:-130px;
    margin-bottom:25px;
    animation:floatLogo 3s ease-in-out infinite;
}

.logo-container img{
    width:290px;
    max-width:95%;
    filter:
        drop-shadow(0 0 12px rgba(255,255,255,0.2))
        drop-shadow(0 0 30px rgba(255,105,180,0.18));
}

@keyframes floatLogo{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-8px);
    }
}

/* TITLE */

.title{
    font-size:clamp(3.2rem,9vw,5rem);
    color:#ff5ea8;
    text-shadow:
        0 0 10px rgba(255,94,168,0.5),
        0 0 25px rgba(255,94,168,0.4);
}

.subtitle{
    font-size:1.3rem;
    color:#ddd;
    margin-top:12px;
    margin-bottom:55px;
}

/* GAMES GRID */

.games-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:22px;
    width:100%;
    max-width:420px;
    margin-top:10px;
}

/* GAME CARDS */

.game-card{
    aspect-ratio:1;
    min-height:155px;
    border-radius:28px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:0.25s;
    box-shadow:0 10px 25px rgba(0,0,0,0.45);
    position:relative;
    overflow:hidden;
}

.game-card:hover{
    transform:scale(1.05);
}

.game-card:active{
    transform:scale(0.95);
}

.bubble{
    background:linear-gradient(145deg,#003d73,#001d3d);
}

.color{
    background:linear-gradient(145deg,#7a001c,#45000f);
}

.shape{
    background:linear-gradient(145deg,#013b13,#001d08);
}

.game-icon{
    font-size:3.3rem;
    margin-bottom:12px;
}

.game-label{
    font-size:0.95rem;
    color:white;
    text-align:center;
    line-height:1.2;
    width:100%;
    padding:0 6px;
}

/* GAME SCREEN */

.game-screen{
    position:fixed;
    inset:0;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:
        radial-gradient(circle at top left, rgba(255,0,120,0.15), transparent 35%),
        radial-gradient(circle at bottom right, rgba(0,255,120,0.15), transparent 35%),
        linear-gradient(135deg,#050505,#111111,#071b07);
    z-index:100;
}

.game-screen.active{
    display:flex;
}

/* HEADER */

.game-header{
    position:absolute;
    top:15px;
    width:100%;
    padding:0 18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.back-btn{
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    font-size:1.4rem;
    background:white;
    color:black;
    cursor:pointer;
}

.game-title{
    font-size:1.2rem;
    color:#ff5ea8;
}

.score-display{
    background:white;
    color:black;
    padding:10px 18px;
    border-radius:20px;
    font-size:0.9rem;
}

/* BUBBLE GAME */

.bubble-area{
    width:100%;
    height:100%;
    position:relative;
    overflow:hidden;
}

.bubble-item{
    position:absolute;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:2rem;
    cursor:pointer;
    animation:floatUp linear forwards;
    box-shadow:
        inset -5px -5px 15px rgba(0,0,0,0.15),
        inset 5px 5px 15px rgba(255,255,255,0.35);
}

@keyframes floatUp{
    from{
        transform:translateY(120vh);
    }
    to{
        transform:translateY(-200px);
    }
}

/* COLOR GAME */

.color-game-area{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:35px;
}

.target-display{
    width:160px;
    height:160px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:4rem;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.color-options{
    display:flex;
    gap:18px;
    flex-wrap:wrap;
    justify-content:center;
    width:320px;
}

.color-btn{
    width:90px;
    height:90px;
    border-radius:25px;
    border:4px solid white;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:2rem;
    transition:0.2s;
}

.color-btn:active{
    transform:scale(0.9);
}

/* SHAPE GAME */

.shape-game-area{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:50px;
}

.shape-target{
    width:160px;
    height:160px;
    border:5px dashed rgba(255,255,255,0.4);
    border-radius:25px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:4rem;
}

.shape-options{
    display:flex;
    gap:20px;
}

.shape-piece{
    width:90px;
    height:90px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:3.3rem;
    cursor:pointer;
}

/* MOBILE */

@media(max-width:420px){

    .logo-container{
        margin-top:-110px;
    }

    .logo-container img{
        width:270px;
    }

    .title{
        font-size:3.4rem;
    }

    .games-grid{
        gap:16px;
    }

    .game-card{
        min-height:135px;
    }

    .game-label{
        font-size:0.85rem;
    }

    .game-icon{
        font-size:2.9rem;
    }
}

</style>
</head>

<body>

<!-- HOME -->

<div id="homeScreen">

    <div class="logo-container">
        <img src="images/bloop-logo.png" alt="Bloop Playground Logo">
    </div>

    <h1 class="title">Bloop Playground</h1>

    <p class="subtitle">Tap a game to play!</p>

    <div class="games-grid">

        <div class="game-card bubble" onclick="startGame('bubble')">
            <div class="game-icon">🫧</div>
            <div class="game-label">Bubble Pop</div>
        </div>

        <div class="game-card color" onclick="startGame('color')">
            <div class="game-icon">🎨</div>
            <div class="game-label">Color Match</div>
        </div>

        <div class="game-card shape" onclick="startGame('shape')">
            <div class="game-icon">🔷</div>
            <div class="game-label">Shape Sorter</div>
        </div>

    </div>

</div>

<!-- BUBBLE GAME -->

<div id="bubbleGame" class="game-screen">

    <div class="game-header">
        <button class="back-btn" onclick="goHome()">←</button>
        <div class="game-title">Bubble Pop</div>
        <div class="score-display">⭐ <span id="bubbleScore">0</span></div>
    </div>

    <div class="bubble-area" id="bubbleArea"></div>

</div>

<!-- COLOR GAME -->

<div id="colorGame" class="game-screen">

    <div class="game-header">
        <button class="back-btn" onclick="goHome()">←</button>
        <div class="game-title">Color Match</div>
        <div class="score-display">⭐ <span id="colorScore">0</span></div>
    </div>

    <div class="color-game-area">

        <div class="target-display" id="targetDisplay"></div>

        <div class="color-options" id="colorOptions"></div>

    </div>

</div>

<!-- SHAPE GAME -->

<div id="shapeGame" class="game-screen">

    <div class="game-header">
        <button class="back-btn" onclick="goHome()">←</button>
        <div class="game-title">Shape Sorter</div>
        <div class="score-display">⭐ <span id="shapeScore">0</span></div>
    </div>

    <div class="shape-game-area">

        <div class="shape-target" id="shapeTarget"></div>

        <div class="shape-options" id="shapeOptions"></div>

    </div>

</div>

<script>

/* AUDIO */

const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;

/* MUSIC */

const musicTracks = [
    "assets/music/come-and-join.mp3",
    "assets/music/tom and jerry.mp3",
    "assets/music/ukulele-happiness.mp3",
    "assets/music/cheerful instrumental children.mp3"
];

let currentTrack = 0;

const bgMusic = new Audio();
bgMusic.volume = 0.3;

bgMusic.addEventListener('ended', () => {

    currentTrack++;

    if(currentTrack >= musicTracks.length){
        currentTrack = 0;
    }

    bgMusic.src = musicTracks[currentTrack];
    bgMusic.play();

});

function startBackgroundMusic(){

    bgMusic.src = musicTracks[currentTrack];

    bgMusic.play().catch(() => {});

}

function initAudio(){

    if(!audioCtx){
        audioCtx = new AudioContext();
    }

    if(bgMusic.paused){
        startBackgroundMusic();
    }
}

/* VOICE */

function speak(text){

    const speech = new SpeechSynthesisUtterance(text);

    speech.pitch = 1.3;
    speech.rate = 1;
    speech.volume = 1;

    window.speechSynthesis.speak(speech);
}

/* SOUND FX */

function playSound(type){

    initAudio();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    switch(type){

        case 'pop':

            osc.frequency.setValueAtTime(600, audioCtx.currentTime);

            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);

            gain.gain.exponentialRampToValueAtTime(
                0.01,
                audioCtx.currentTime + 0.2
            );

            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);

        break;

        case 'correct':

            osc.frequency.setValueAtTime(700, audioCtx.currentTime);

            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);

            gain.gain.exponentialRampToValueAtTime(
                0.01,
                audioCtx.currentTime + 0.3
            );

            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);

        break;

        case 'wrong':

            osc.frequency.setValueAtTime(200, audioCtx.currentTime);

            gain.gain.setValueAtTime(0.25, audioCtx.currentTime);

            gain.gain.exponentialRampToValueAtTime(
                0.01,
                audioCtx.currentTime + 0.4
            );

            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);

        break;
    }
}

/* STATE */

let currentGame = null;
let bubbleInterval;

let scores = {
    bubble:0,
    color:0,
    shape:0
};

/* START GAME */

function startGame(game){

    currentGame = game;

    document.querySelectorAll('.game-screen').forEach(screen=>{
        screen.classList.remove('active');
    });

    document.getElementById(game + 'Game').classList.add('active');

    if(game === 'bubble'){
        startBubbleGame();
    }

    if(game === 'color'){
        startColorGame();
    }

    if(game === 'shape'){
        startShapeGame();
    }
}

/* HOME */

function goHome(){

    clearInterval(bubbleInterval);

    document.querySelectorAll('.game-screen').forEach(screen=>{
        screen.classList.remove('active');
    });
}

/* SCORE */

function updateScore(game){

    document.getElementById(game + 'Score').textContent = scores[game];

}

/* BUBBLE */

function startBubbleGame(){

    scores.bubble = 0;

    updateScore('bubble');

    const area = document.getElementById('bubbleArea');

    area.innerHTML = '';

    clearInterval(bubbleInterval);

    const emojis = ['🫧','⭐','🌈','🍭'];

    const colors = [
        '#ff5ea8',
        '#00d4ff',
        '#ffd93d',
        '#8affc1'
    ];

    bubbleInterval = setInterval(()=>{

        const bubble = document.createElement('div');

        bubble.className = 'bubble-item';

        const size = Math.random() * 50 + 60;

        bubble.style.width = size + 'px';
        bubble.style.height = size + 'px';

        bubble.style.background =
            colors[Math.floor(Math.random()*colors.length)];

        bubble.style.left =
            Math.random() * (window.innerWidth - size) + 'px';

        bubble.style.animationDuration =
            (Math.random() * 3 + 4) + 's';

        bubble.textContent =
            emojis[Math.floor(Math.random()*emojis.length)];

        bubble.onclick = () => {

            playSound('pop');

            bubble.remove();

            scores.bubble++;

            updateScore('bubble');

            if(scores.bubble % 5 === 0){

                speak("Awesome!");

            }else{

                speak("Great job!");
            }
        };

        area.appendChild(bubble);

        setTimeout(()=>{

            bubble.remove();

        },7000);

    },1000);
}

/* COLOR */

const colorData = [

    {
        name:'red',
        hex:'#ff3b3b',
        emoji:'🔴'
    },

    {
        name:'blue',
        hex:'#0066ff',
        emoji:'🔵'
    },

    {
        name:'green',
        hex:'#00cc44',
        emoji:'🟢'
    },

    {
        name:'yellow',
        hex:'#ffd400',
        emoji:'🟡'
    }

];

let currentTargetColor;

function startColorGame(){

    scores.color = 0;

    updateScore('color');

    nextColorRound();

}

function nextColorRound(){

    const target =
        colorData[Math.floor(Math.random()*colorData.length)];

    currentTargetColor = target;

    const display = document.getElementById('targetDisplay');

    display.style.background = target.hex;

    display.textContent = target.emoji;

    const options = document.getElementById('colorOptions');

    options.innerHTML = '';

    const shuffled = [...colorData]
        .sort(()=>Math.random()-0.5);

    shuffled.forEach(color=>{

        const btn = document.createElement('div');

        btn.className = 'color-btn';

        btn.style.background = color.hex;

        btn.textContent = color.emoji;

        btn.onclick = ()=>checkColor(color);

        options.appendChild(btn);

    });
}

function checkColor(color){

    if(color.name === currentTargetColor.name){

        playSound('correct');

        speak("Great job!");

        scores.color++;

        updateScore('color');

        setTimeout(()=>{

            nextColorRound();

        },700);

    }else{

        playSound('wrong');

        speak("Try again!");
    }
}

/* SHAPE */

const shapeData = [

    {
        name:'circle',
        emoji:'⭕'
    },

    {
        name:'square',
        emoji:'⬜'
    },

    {
        name:'triangle',
        emoji:'🔺'
    },

    {
        name:'diamond',
        emoji:'🔷'
    }

];

let currentTargetShape;

function startShapeGame(){

    scores.shape = 0;

    updateScore('shape');

    nextShapeRound();

}

function nextShapeRound(){

    const target =
        shapeData[Math.floor(Math.random()*shapeData.length)];

    currentTargetShape = target;

    document.getElementById('shapeTarget').textContent =
        target.emoji;

    const options = document.getElementById('shapeOptions');

    options.innerHTML = '';

    const shuffled = [...shapeData]
        .sort(()=>Math.random()-0.5);

    shuffled.forEach(shape=>{

        const piece = document.createElement('div');

        piece.className = 'shape-piece';

        piece.textContent = shape.emoji;

        piece.onclick = ()=>checkShape(shape);

        options.appendChild(piece);

    });
}

function checkShape(shape){

    if(shape.name === currentTargetShape.name){

        playSound('correct');

        speak("Awesome!");

        scores.shape++;

        updateScore('shape');

        setTimeout(()=>{

            nextShapeRound();

        },700);

    }else{

        playSound('wrong');

        speak("Try again!");
    }
}

</script>

</body>
</html>
