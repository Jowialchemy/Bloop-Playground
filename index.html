<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Bloop Playground</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:'Fredoka One', cursive;
    min-height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#FFE5E5,#FFF7E6,#E9FFE8,#E8F4FF);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* MAIN CONTAINER */
.app{
    width:100%;
    max-width:430px;
    margin:auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px;
}

/* BLOOP */
.bloop-container{
    width:120px;
    height:120px;
    margin-bottom:15px;
    animation:bounce 2s infinite;
}

.bloop{
    width:100%;
    height:100%;
    background:linear-gradient(145deg,#ff8eb5,#ff5e93);
    border-radius:50%;
    position:relative;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.eye{
    width:24px;
    height:32px;
    background:white;
    border-radius:50%;
    position:absolute;
    top:32px;
}

.eye.left{ left:28px; }
.eye.right{ right:28px; }

.pupil{
    width:12px;
    height:16px;
    background:#222;
    border-radius:50%;
    position:absolute;
    top:8px;
    left:6px;
}

.mouth{
    width:38px;
    height:18px;
    border:4px solid #222;
    border-top:none;
    border-radius:0 0 40px 40px;
    position:absolute;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
}

@keyframes bounce{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-10px); }
}

/* TITLE */
.title{
    font-size:clamp(2rem,6vw,3rem);
    color:#ff4f8f;
    margin-bottom:10px;
    text-shadow:0 4px 10px rgba(255,79,143,0.2);
    line-height:1.1;
}

.subtitle{
    font-size:1rem;
    color:#555;
    margin-bottom:30px;
}

/* GAME GRID */
.games-grid{
    width:100%;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    justify-content:center;
    align-items:center;
}

/* GAME CARDS */
.game-card{
    aspect-ratio:1/1;
    border-radius:25px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:0.25s;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    padding:10px;
}

.game-card:hover{
    transform:scale(1.05);
}

.game-card:active{
    transform:scale(0.95);
}

.bubble-card{
    background:linear-gradient(145deg,#8de7df,#6ccfff);
}

.color-card{
    background:linear-gradient(145deg,#ffd1c2,#ffb7b2);
}

.shape-card{
    background:linear-gradient(145deg,#d6f5d0,#b9efc1);
}

.game-icon{
    font-size:2.4rem;
    margin-bottom:8px;
}

.game-label{
    font-size:0.85rem;
    color:white;
    text-shadow:0 2px 5px rgba(0,0,0,0.2);
    line-height:1.1;
}

/* GAME SCREEN */
.game-screen{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#fff1f1,#eef8ff);
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
}

.game-screen.active{
    display:flex;
}

.game-header{
    width:100%;
    max-width:500px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
}

.back-btn{
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    background:white;
    font-size:1.5rem;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.score{
    background:white;
    padding:10px 18px;
    border-radius:20px;
    color:#666;
}

/* BUBBLE GAME */
.bubble-area{
    position:relative;
    width:100%;
    flex:1;
    overflow:hidden;
}

.bubble{
    position:absolute;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    animation:floatUp linear forwards;
    font-size:1.8rem;
    box-shadow:0 10px 20px rgba(0,0,0,0.12);
}

@keyframes floatUp{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-150px);
    }
}

/* COLOR GAME */
.color-game{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:25px;
    width:100%;
}

.target{
    width:140px;
    height:140px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:4rem;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.color-options{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
}

.color-btn{
    width:80px;
    height:80px;
    border-radius:20px;
    border:5px solid white;
    cursor:pointer;
}

/* SHAPE GAME */
.shape-game{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:30px;
    width:100%;
}

.shape-target{
    width:140px;
    height:140px;
    border:5px dashed #ccc;
    border-radius:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:4rem;
}

.shape-options{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
}

.shape-piece{
    font-size:4rem;
    cursor:pointer;
    transition:0.2s;
}

.shape-piece:hover{
    transform:scale(1.1);
}

/* MOBILE FIX */
@media(max-width:420px){

    .games-grid{
        gap:12px;
    }

    .game-label{
        font-size:0.72rem;
    }

    .game-icon{
        font-size:2rem;
    }

    .title{
        font-size:2.4rem;
    }
}
</style>
</head>

<body>

<div class="app">

    <!-- BLOOP -->
    <div class="bloop-container">
        <div class="bloop">
            <div class="eye left"><div class="pupil"></div></div>
            <div class="eye right"><div class="pupil"></div></div>
            <div class="mouth"></div>
        </div>
    </div>

    <h1 class="title">Bloop Playground</h1>
    <p class="subtitle">Tap a game to play 🎮</p>

    <!-- GAME CARDS -->
    <div class="games-grid">

        <div class="game-card bubble-card" onclick="startGame('bubble')">
            <div class="game-icon">🫧</div>
            <div class="game-label">Bubble Pop</div>
        </div>

        <div class="game-card color-card" onclick="startGame('color')">
            <div class="game-icon">🎨</div>
            <div class="game-label">Color Match</div>
        </div>

        <div class="game-card shape-card" onclick="startGame('shape')">
            <div class="game-icon">🔷</div>
            <div class="game-label">Shape Sorter</div>
        </div>

    </div>
</div>

<!-- BUBBLE GAME -->
<div id="bubbleGame" class="game-screen">
    <div class="game-header">
        <button class="back-btn" onclick="goHome()">←</button>
        <div class="score">⭐ <span id="bubbleScore">0</span></div>
    </div>

    <div class="bubble-area" id="bubbleArea"></div>
</div>

<!-- COLOR GAME -->
<div id="colorGame" class="game-screen">
    <div class="game-header">
        <button class="back-btn" onclick="goHome()">←</button>
        <div class="score">⭐ <span id="colorScore">0</span></div>
    </div>

    <div class="color-game">
        <div class="target" id="targetDisplay">❓</div>
        <div class="color-options" id="colorOptions"></div>
    </div>
</div>

<!-- SHAPE GAME -->
<div id="shapeGame" class="game-screen">
    <div class="game-header">
        <button class="back-btn" onclick="goHome()">←</button>
        <div class="score">⭐ <span id="shapeScore">0</span></div>
    </div>

    <div class="shape-game">
        <div class="shape-target" id="shapeTarget">❓</div>
        <div class="shape-options" id="shapeOptions"></div>
    </div>
</div>

<script>

/* ================= MUSIC ================= */

const musicTracks = [
    "assets/music/come-and-join.mp3",
    "assets/music/tom and jerry.mp3",
    "assets/music/ukulele-happiness.mp3",
    "assets/music/cheerful instrumental children.mp3"
];

let currentTrack = 0;

const bgMusic = new Audio();
bgMusic.volume = 0.3;

bgMusic.addEventListener("ended", () => {
    currentTrack++;
    if(currentTrack >= musicTracks.length){
        currentTrack = 0;
    }
    bgMusic.src = musicTracks[currentTrack];
    bgMusic.play();
});

function startBackgroundMusic(){
    bgMusic.src = musicTracks[currentTrack];
    bgMusic.play().catch(() => {});
}

/* ================= VOICE ================= */

function speak(text){

    const speech = new SpeechSynthesisUtterance(text);

    speech.rate = 0.9;
    speech.pitch = 1.3;
    speech.volume = 1;

    speechSynthesis.speak(speech);
}

/* ================= GAME STATE ================= */

let scores = {
    bubble:0,
    color:0,
    shape:0
};

let bubbleInterval;

/* ================= START GAME ================= */

function startGame(game){

    if(bgMusic.paused){
        startBackgroundMusic();
    }

    document.querySelectorAll(".game-screen")
        .forEach(screen => screen.classList.remove("active"));

    document.getElementById(game + "Game")
        .classList.add("active");

    if(game === "bubble"){
        startBubbleGame();
    }

    if(game === "color"){
        startColorGame();
    }

    if(game === "shape"){
        startShapeGame();
    }
}

/* ================= GO HOME ================= */

function goHome(){

    clearInterval(bubbleInterval);

    document.querySelectorAll(".game-screen")
        .forEach(screen => screen.classList.remove("active"));
}

/* ================= BUBBLE GAME ================= */

function startBubbleGame(){

    const area = document.getElementById("bubbleArea");

    area.innerHTML = "";

    scores.bubble = 0;

    updateScore("bubble");

    const colors = [
        "#ff7eb3",
        "#7afcff",
        "#feff9c",
        "#baffc9",
        "#ffb3ba"
    ];

    const emojis = [
        "⭐",
        "🫧",
        "🌈",
        "🦋",
        "🍭"
    ];

    bubbleInterval = setInterval(() => {

        const bubble = document.createElement("div");

        bubble.className = "bubble";

        const size = Math.random() * 40 + 60;

        bubble.style.width = size + "px";
        bubble.style.height = size + "px";

        bubble.style.background =
            colors[Math.floor(Math.random() * colors.length)];

        bubble.style.left =
            Math.random() * (window.innerWidth - size) + "px";

        bubble.style.animationDuration =
            (Math.random() * 2 + 4) + "s";

        bubble.textContent =
            emojis[Math.floor(Math.random() * emojis.length)];

        bubble.onclick = () => {

            bubble.remove();

            scores.bubble++;

            updateScore("bubble");

            speak("Yay!");

            if(scores.bubble % 5 === 0){
                speak("Awesome!");
            }
        };

        area.appendChild(bubble);

        setTimeout(() => {
            bubble.remove();
        }, 6000);

    }, 1000);
}

/* ================= COLOR GAME ================= */

const colorData = [
    { name:"red", hex:"#ff6b6b", emoji:"🔴" },
    { name:"blue", hex:"#4ecdc4", emoji:"🔵" },
    { name:"yellow", hex:"#ffd93d", emoji:"🟡" },
    { name:"green", hex:"#95e1d3", emoji:"🟢" }
];

let currentTargetColor;

function startColorGame(){

    scores.color = 0;

    updateScore("color");

    nextColorRound();
}

function nextColorRound(){

    currentTargetColor =
        colorData[Math.floor(Math.random() * colorData.length)];

    const target = document.getElementById("targetDisplay");

    target.style.background = currentTargetColor.hex;

    target.textContent = currentTargetColor.emoji;

    const options = document.getElementById("colorOptions");

    options.innerHTML = "";

    colorData.forEach(color => {

        const btn = document.createElement("div");

        btn.className = "color-btn";

        btn.style.background = color.hex;

        btn.onclick = () => {

            if(color.name === currentTargetColor.name){

                scores.color++;

                updateScore("color");

                speak("Great job!");

                nextColorRound();

            }else{

                speak("Try again!");
            }
        };

        options.appendChild(btn);
    });
}

/* ================= SHAPE GAME ================= */

const shapeData = [
    "⭐",
    "❤️",
    "🔷",
    "⭕"
];

let currentShape;

function startShapeGame(){

    scores.shape = 0;

    updateScore("shape");

    nextShapeRound();
}

function nextShapeRound(){

    currentShape =
        shapeData[Math.floor(Math.random() * shapeData.length)];

    document.getElementById("shapeTarget").textContent =
        currentShape;

    const options = document.getElementById("shapeOptions");

    options.innerHTML = "";

    shapeData.forEach(shape => {

        const piece = document.createElement("div");

        piece.className = "shape-piece";

        piece.textContent = shape;

        piece.onclick = () => {

            if(shape === currentShape){

                scores.shape++;

                updateScore("shape");

                speak("Awesome!");

                nextShapeRound();

            }else{

                speak("Try again!");
            }
        };

        options.appendChild(piece);
    });
}

/* ================= SCORE ================= */

function updateScore(game){

    document.getElementById(game + "Score")
        .textContent = scores[game];
}

</script>

</body>
</html>
