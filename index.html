<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>Bloop Playground</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Baloo 2', cursive;
    overflow:hidden;
    height:100vh;

    background:
    radial-gradient(circle at top left, rgba(255,0,80,0.35), transparent 35%),
    radial-gradient(circle at bottom right, rgba(0,255,120,0.25), transparent 35%),
    linear-gradient(135deg,#090909,#111111,#001a00);

    color:white;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.container{
    width:100%;
    max-width:430px;
    padding:20px;

    display:flex;
    flex-direction:column;
    align-items:center;
}

/* ===== LOGO ===== */

.logo{
    width:340px;
    max-width:92%;
    margin-top:40px;
    margin-bottom:8px;

    filter:
    drop-shadow(0 0 18px rgba(255,255,255,0.15))
    drop-shadow(0 0 30px rgba(255,0,150,0.18));
}

/* ===== TITLE ===== */

h1{
    font-size:4rem;
    line-height:1;
    color:#ff5ea8;

    text-shadow:
    0 0 12px rgba(255,0,120,0.35);

    margin-top:0;
    margin-bottom:6px;
}

.subtitle{
    font-size:1.2rem;
    color:#e9e9e9;
    margin-bottom:20px;
}

/* ===== GAME CARDS ===== */

.games{
    display:flex;
    gap:24px;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    margin-top:20px;
}

.game-card{
    width:118px;
    height:118px;

    border-radius:28px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    cursor:pointer;

    transition:0.25s;

    box-shadow:
    0 10px 30px rgba(0,0,0,0.45);
}

.game-card:hover{
    transform:translateY(-8px) scale(1.05);
}

.game-icon{
    font-size:52px;
    margin-bottom:8px;
}

.game-title{
    font-size:0.95rem;
    font-weight:800;
    color:white;
}

/* individual card colors */

.bubble{
    background:linear-gradient(145deg,#001a5e,#00103d);
}

.color{
    background:linear-gradient(145deg,#7d0017,#4a000d);
}

.shape{
    background:linear-gradient(145deg,#003300,#001900);
}

/* ===== GAME AREA ===== */

#gameArea{
    margin-top:25px;
    width:100%;
}

/* ===== BUBBLES ===== */

.bubble-item{
    width:85px;
    height:85px;

    border-radius:50%;
    position:absolute;

    animation:floatUp 6s linear forwards;

    cursor:pointer;

    box-shadow:
    inset -10px -10px 20px rgba(255,255,255,0.2),
    inset 10px 10px 20px rgba(0,0,0,0.2),
    0 0 18px rgba(255,255,255,0.25);
}

@keyframes floatUp{
    from{
        transform:translateY(120vh);
    }
    to{
        transform:translateY(-120vh);
    }
}

/* ===== COLOR GAME ===== */

.color-btn{
    width:90px;
    height:90px;
    border:none;
    border-radius:22px;
    margin:10px;
    cursor:pointer;
}

/* ===== SHAPE GAME ===== */

.shape-box{
    font-size:70px;
    margin:18px;
}

/* ===== MOBILE ===== */

@media(max-width:500px){

    h1{
        font-size:3.3rem;
    }

    .logo{
        width:300px;
    }

    .game-card{
        width:105px;
        height:105px;
    }

}

</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <img src="images/bloop-logo.png" class="logo">

    <!-- TITLE -->
    <h1>Bloop Playground</h1>

    <div class="subtitle">
        Tap a game to play! 🎮
    </div>

    <!-- GAMES -->
    <div class="games">

        <div class="game-card bubble" onclick="startBubbleGame()">
            <div class="game-icon">🫧</div>
            <div class="game-title">Bubble Pop</div>
        </div>

        <div class="game-card color" onclick="startColorGame()">
            <div class="game-icon">🎨</div>
            <div class="game-title">Color Match</div>
        </div>

        <div class="game-card shape" onclick="startShapeGame()">
            <div class="game-icon">🔷</div>
            <div class="game-title">Shape Sorter</div>
        </div>

    </div>

    <div id="gameArea"></div>

</div>

<script>

/* =========================
   AUDIO + VOICE
========================= */

const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;

const voicesGood = [
    "Great job!",
    "Awesome!",
    "Fantastic!",
    "Well done!"
];

const voicesTry = [
    "Try again!",
    "Oops!",
    "Not quite!"
];

function speak(text){

    const speech = new SpeechSynthesisUtterance(text);

    speech.rate = 0.9;
    speech.pitch = 1.2;
    speech.volume = 1;

    speechSynthesis.speak(speech);
}

/* =========================
   MUSIC
========================= */

const musicTracks = [
    "assets/music/come-and-join.mp3",
    "assets/music/tom and jerry.mp3",
    "assets/music/ukulele-happiness.mp3",
    "assets/music/cheerful instrumental children.mp3"
];

let currentTrack = 0;

const bgMusic = new Audio();

bgMusic.volume = 0.3;
bgMusic.loop = false;

bgMusic.addEventListener("ended", ()=>{

    currentTrack++;

    if(currentTrack >= musicTracks.length){
        currentTrack = 0;
    }

    bgMusic.src = musicTracks[currentTrack];
    bgMusic.play();

});

function startBackgroundMusic(){

    bgMusic.src = musicTracks[currentTrack];

    bgMusic.play().catch(()=>{});

}

/* =========================
   SOUND FX
========================= */

function initAudio(){

    if(!audioCtx){
        audioCtx = new AudioContext();
    }

    if(bgMusic.paused){
        startBackgroundMusic();
    }
}

function playSound(type){

    initAudio();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if(type === "correct"){

        osc.frequency.value = 700;

    }else{

        osc.frequency.value = 250;
    }

    gain.gain.value = 0.2;

    osc.start();

    osc.stop(audioCtx.currentTime + 0.2);
}

/* =========================
   BUBBLE GAME
========================= */

function startBubbleGame(){

    initAudio();

    const area = document.getElementById("gameArea");
    area.innerHTML = "";

    for(let i=0;i<10;i++){

        const bubble = document.createElement("div");

        bubble.className = "bubble-item";

        bubble.style.left = Math.random()*80 + "%";

        bubble.style.background =
        `rgba(${Math.random()*255},
        ${Math.random()*255},
        255,0.45)`;

        bubble.onclick = ()=>{

            playSound("correct");

            speak(
                voicesGood[
                    Math.floor(Math.random()*voicesGood.length)
                ]
            );

            bubble.remove();
        };

        document.body.appendChild(bubble);

        setTimeout(()=>{
            bubble.remove();
        },6000);
    }
}

/* =========================
   COLOR GAME
========================= */

function startColorGame(){

    initAudio();

    const area = document.getElementById("gameArea");

    const colors = [

        {name:"RED", code:"#ff0000"},
        {name:"BLUE", code:"#0066ff"},
        {name:"GREEN", code:"#00cc44"},
        {name:"YELLOW", code:"#ffd400"}

    ];

    const answer =
    colors[Math.floor(Math.random()*colors.length)];

    area.innerHTML = `
        <h2 style="margin-bottom:15px;">
            Tap ${answer.name}
        </h2>
    `;

    colors.forEach(c=>{

        const btn = document.createElement("button");

        btn.className = "color-btn";

        btn.style.background = c.code;

        btn.onclick = ()=>{

            if(c.name === answer.name){

                playSound("correct");

                speak(
                    voicesGood[
                        Math.floor(Math.random()*voicesGood.length)
                    ]
                );

            }else{

                playSound("wrong");

                speak(
                    voicesTry[
                        Math.floor(Math.random()*voicesTry.length)
                    ]
                );
            }

        };

        area.appendChild(btn);

    });

}

/* =========================
   SHAPE GAME
========================= */

function startShapeGame(){

    initAudio();

    const area = document.getElementById("gameArea");

    const shapes = ["🔺","🟢","⭐","🔷"];

    const answer =
    shapes[Math.floor(Math.random()*shapes.length)];

    area.innerHTML = `
        <h2 style="margin-bottom:15px;">
            Tap ${answer}
        </h2>
    `;

    shapes.forEach(shape=>{

        const div = document.createElement("div");

        div.className = "shape-box";

        div.innerHTML = shape;

        div.onclick = ()=>{

            if(shape === answer){

                playSound("correct");

                speak(
                    voicesGood[
                        Math.floor(Math.random()*voicesGood.length)
                    ]
                );

            }else{

                playSound("wrong");

                speak(
                    voicesTry[
                        Math.floor(Math.random()*voicesTry.length)
                    ]
                );
            }

        };

        area.appendChild(div);

    });

}

</script>

</body>
</html>
