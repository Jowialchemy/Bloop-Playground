<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Bloop Playground</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:'Fredoka One', cursive;
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top left,#ffb6d9 0%,transparent 25%),
    radial-gradient(circle at bottom right,#b6ffd9 0%,transparent 25%),
    linear-gradient(135deg,#fff3f7,#fffde9,#f0fff4,#eef7ff);
}

#homeScreen{
    width:100%;
    max-width:430px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
}

.bloop-container{
    margin-bottom:20px;
    animation:bounce 2s infinite;
}

.bloop{
    width:130px;
    height:130px;
    border-radius:50%;
    background:linear-gradient(145deg,#ff88b7,#ff5fa2);
    position:relative;
    box-shadow:0 10px 30px rgba(255,105,180,.4);
}

.eye{
    position:absolute;
    width:24px;
    height:34px;
    background:white;
    border-radius:50%;
    top:35px;
}

.eye.left{ left:32px; }
.eye.right{ right:32px; }

.pupil{
    width:12px;
    height:18px;
    background:#222;
    border-radius:50%;
    position:absolute;
    top:8px;
    left:6px;
}

.mouth{
    position:absolute;
    width:42px;
    height:20px;
    border:4px solid #333;
    border-top:none;
    border-radius:0 0 40px 40px;
    left:50%;
    bottom:28px;
    transform:translateX(-50%);
}

@keyframes bounce{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-10px); }
}

.title{
    font-size:clamp(2.5rem,8vw,4rem);
    color:#ff4f9a;
    margin-bottom:10px;
    text-shadow:0 4px 10px rgba(255,79,154,.25);
}

.subtitle{
    color:#666;
    font-size:1.2rem;
    margin-bottom:35px;
}

.games-grid{
    width:100%;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:18px;
}

.game-card{
    aspect-ratio:1;
    border-radius:28px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    cursor:pointer;
    transition:.25s;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    padding:10px;
}

.game-card:hover{
    transform:scale(1.05);
}

.game-icon{
    font-size:3rem;
    margin-bottom:10px;
}

.game-label{
    font-size:1rem;
    text-align:center;
    line-height:1.2;
}

.bubble-card{
    background:linear-gradient(145deg,#42c9ff,#1e88ff);
}

.color-card{
    background:linear-gradient(145deg,#ff9c7f,#ff6f91);
}

.shape-card{
    background:linear-gradient(145deg,#88e0a3,#45c97a);
}

.game-screen{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#fff3f7,#eefcff);
    display:none;
    flex-direction:column;
    align-items:center;
}

.game-screen.active{
    display:flex;
}

.game-header{
    width:100%;
    max-width:500px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
}

.back-btn{
    border:none;
    background:white;
    width:55px;
    height:55px;
    border-radius:50%;
    font-size:1.5rem;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.score{
    background:white;
    padding:10px 20px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.bubble-area{
    flex:1;
    width:100%;
    position:relative;
    overflow:hidden;
}

.bubble{
    position:absolute;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:2rem;
    color:white;
    animation:floatUp linear forwards;
    cursor:pointer;
    box-shadow:inset -5px -5px 15px rgba(0,0,0,.1),
               inset 5px 5px 15px rgba(255,255,255,.4);
}

@keyframes floatUp{
    from{
        transform:translateY(110vh);
    }
    to{
        transform:translateY(-150px);
    }
}

.color-game-area,
.shape-game-area{
    flex:1;
    width:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:30px;
    padding:20px;
}

.target-display,
.shape-target{
    width:170px;
    height:170px;
    border-radius:30px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:5rem;
    background:white;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.color-options,
.shape-options{
    display:flex;
    gap:18px;
    flex-wrap:wrap;
    justify-content:center;
    max-width:450px;
}

.color-btn,
.shape-piece{
    width:90px;
    height:90px;
    border-radius:24px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:2.4rem;
    cursor:pointer;
    transition:.2s;
    box-shadow:0 8px 20px rgba(0,0,0,.12);
}

.color-btn:hover,
.shape-piece:hover{
    transform:scale(1.08);
}

.celebration{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
}

.confetti{
    position:absolute;
    width:12px;
    height:12px;
    border-radius:50%;
    animation:fall 2s linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-100px);
        opacity:1;
    }
    to{
        transform:translateY(100vh) rotate(720deg);
        opacity:0;
    }
}

@media(max-width:430px){

    .games-grid{
        gap:14px;
    }

    .game-label{
        font-size:.9rem;
    }

    .game-icon{
        font-size:2.5rem;
    }

    .color-btn,
    .shape-piece{
        width:75px;
        height:75px;
        font-size:2rem;
    }
}
</style>
</head>

<body>

<div id="homeScreen">

    <div class="bloop-container">
        <div class="bloop">
            <div class="eye left"><div class="pupil"></div></div>
            <div class="eye right"><div class="pupil"></div></div>
            <div class="mouth"></div>
        </div>
    </div>

    <h1 class="title">Bloop Playground</h1>
    <p class="subtitle">Tap a game to play 🎮</p>

    <div class="games-grid">

        <div class="game-card bubble-card" onclick="startGame('bubble')">
            <div class="game-icon">🫧</div>
            <div class="game-label">Bubble Pop</div>
        </div>

        <div class="game-card color-card" onclick="startGame('color')">
            <div class="game-icon">🎨</div>
            <div class="game-label">Color Match</div>
        </div>

        <div class="game-card shape-card" onclick="startGame('shape')">
            <div class="game-icon">🔷</div>
            <div class="game-label">Shape Sorter</div>
        </div>

    </div>
</div>

<!-- Bubble -->
<div id="bubbleGame" class="game-screen">

    <div class="game-header">
        <button class="back-btn" onclick="goHome()">←</button>
        <div class="score">⭐ <span id="bubbleScore">0</span></div>
    </div>

    <div class="bubble-area" id="bubbleArea"></div>

</div>

<!-- Color -->
<div id="colorGame" class="game-screen">

    <div class="game-header">
        <button class="back-btn" onclick="goHome()">←</button>
        <div class="score">⭐ <span id="colorScore">0</span></div>
    </div>

    <div class="color-game-area">

        <div class="target-display" id="targetDisplay"></div>

        <div class="color-options" id="colorOptions"></div>

    </div>
</div>

<!-- Shape -->
<div id="shapeGame" class="game-screen">

    <div class="game-header">
        <button class="back-btn" onclick="goHome()">←</button>
        <div class="score">⭐ <span id="shapeScore">0</span></div>
    </div>

    <div class="shape-game-area">

        <div class="shape-target" id="shapeTarget"></div>

        <div class="shape-options" id="shapeOptions"></div>

    </div>
</div>

<div class="celebration" id="celebration"></div>

<script>

/* ================= MUSIC ================= */

const musicTracks = [
    "assets/music/come-and-join.mp3",
    "assets/music/tom and jerry.mp3",
    "assets/music/ukulele-happiness.mp3",
    "assets/music/cheerful instrumental children.mp3"
];

let currentTrack = 0;

const bgMusic = new Audio();
bgMusic.volume = 0.25;

bgMusic.addEventListener('ended', () => {

    currentTrack++;

    if(currentTrack >= musicTracks.length){
        currentTrack = 0;
    }

    bgMusic.src = musicTracks[currentTrack];
    bgMusic.play();
});

function startMusic(){

    bgMusic.src = musicTracks[currentTrack];

    bgMusic.play().catch(() => {});
}

/* ================= VOICE ================= */

function speak(text){

    const speech = new SpeechSynthesisUtterance(text);

    speech.rate = 0.9;
    speech.pitch = 1.2;
    speech.volume = 1;

    speechSynthesis.speak(speech);
}

/* ================= GAME ================= */

let currentGame = null;

const scores = {
    bubble:0,
    color:0,
    shape:0
};

function startGame(game){

    currentGame = game;

    startMusic();

    document.querySelectorAll('.game-screen')
    .forEach(screen => screen.classList.remove('active'));

    document.getElementById(game + 'Game')
    .classList.add('active');

    if(game === 'bubble') startBubbleGame();
    if(game === 'color') startColorGame();
    if(game === 'shape') startShapeGame();
}

function goHome(){

    clearInterval(bubbleInterval);

    document.querySelectorAll('.game-screen')
    .forEach(screen => screen.classList.remove('active'));
}

/* ================= BUBBLE ================= */

let bubbleInterval;

function startBubbleGame(){

    const area = document.getElementById('bubbleArea');

    area.innerHTML = '';

    scores.bubble = 0;

    updateScore('bubble');

    clearInterval(bubbleInterval);

    const colors = [
        '#ff5fa2',
        '#1e88ff',
        '#ffb347',
        '#55dd88',
        '#aa77ff'
    ];

    const emojis = ['🫧','⭐','🌈','🍭','🦋'];

    bubbleInterval = setInterval(() => {

        const bubble = document.createElement('div');

        bubble.className = 'bubble';

        const size = Math.random() * 50 + 60;

        bubble.style.width = size + 'px';
        bubble.style.height = size + 'px';

        bubble.style.left =
        Math.random() * (window.innerWidth - size) + 'px';

        bubble.style.background =
        colors[Math.floor(Math.random()*colors.length)];

        bubble.style.animationDuration =
        (Math.random()*2 + 4) + 's';

        bubble.textContent =
        emojis[Math.floor(Math.random()*emojis.length)];

        bubble.addEventListener('click', () => {

            playTone(700);

            speak("Yay!");

            scores.bubble++;

            updateScore('bubble');

            bubble.remove();

            if(scores.bubble % 5 === 0){

                celebrate();

                speak("Awesome!");
            }
        });

        area.appendChild(bubble);

        setTimeout(() => bubble.remove(),7000);

    },900);
}

/* ================= COLOR ================= */

const colorData = [

{
    name:'red',
    hex:'#ff3b30',
    emoji:'🔴'
},

{
    name:'blue',
    hex:'#0066ff',
    emoji:'🔵'
},

{
    name:'green',
    hex:'#00c853',
    emoji:'🟢'
},

{
    name:'yellow',
    hex:'#ffd600',
    emoji:'🟡'
},

{
    name:'purple',
    hex:'#9c27b0',
    emoji:'🟣'
},

{
    name:'orange',
    hex:'#ff6d00',
    emoji:'🟠'
}

];

let currentTargetColor = null;

function startColorGame(){

    scores.color = 0;

    updateScore('color');

    nextColorRound();
}

function nextColorRound(){

    const target =
    colorData[Math.floor(Math.random()*colorData.length)];

    currentTargetColor = target;

    const display =
    document.getElementById('targetDisplay');

    display.style.background = target.hex;

    display.textContent = target.emoji;

    const options =
    document.getElementById('colorOptions');

    options.innerHTML = '';

    const shuffled =
    [...colorData]
    .sort(() => Math.random()-0.5)
    .slice(0,4);

    if(!shuffled.includes(target)){

        shuffled[Math.floor(Math.random()*4)] = target;
    }

    shuffled.forEach(color => {

        const btn = document.createElement('div');

        btn.className = 'color-btn';

        btn.style.background = color.hex;

        btn.textContent = color.emoji;

        btn.onclick = () => {

            if(color.name === currentTargetColor.name){

                playTone(900);

                speak("Great job!");

                scores.color++;

                updateScore('color');

                celebrate();

                setTimeout(nextColorRound,700);

            }else{

                playTone(200);

                speak("Try again!");
            }
        };

        options.appendChild(btn);
    });
}

/* ================= SHAPES ================= */

const shapeData = [

{ name:'circle', emoji:'⭕' },
{ name:'square', emoji:'⬜' },
{ name:'triangle', emoji:'🔺' },
{ name:'diamond', emoji:'🔷' },
{ name:'heart', emoji:'❤️' },
{ name:'star', emoji:'⭐' }

];

let currentTargetShape = null;

function startShapeGame(){

    scores.shape = 0;

    updateScore('shape');

    nextShapeRound();
}

function nextShapeRound(){

    const target =
    shapeData[Math.floor(Math.random()*shapeData.length)];

    currentTargetShape = target;

    document.getElementById('shapeTarget')
    .textContent = target.emoji;

    const options =
    document.getElementById('shapeOptions');

    options.innerHTML = '';

    const shuffled =
    [...shapeData]
    .sort(() => Math.random()-0.5)
    .slice(0,4);

    if(!shuffled.includes(target)){

        shuffled[Math.floor(Math.random()*4)] = target;
    }

    shuffled.forEach(shape => {

        const piece = document.createElement('div');

        piece.className = 'shape-piece';

        piece.textContent = shape.emoji;

        piece.style.background = 'white';

        piece.onclick = () => {

            if(shape.name === currentTargetShape.name){

                playTone(800);

                speak("Awesome!");

                scores.shape++;

                updateScore('shape');

                celebrate();

                setTimeout(nextShapeRound,700);

            }else{

                playTone(180);

                speak("Try again!");
            }
        };

        options.appendChild(piece);
    });
}

/* ================= SCORE ================= */

function updateScore(game){

    document.getElementById(game + 'Score')
    .textContent = scores[game];
}

/* ================= SOUND ================= */

const AudioContextClass =
window.AudioContext || window.webkitAudioContext;

const audioCtx = new AudioContextClass();

function playTone(freq){

    const osc = audioCtx.createOscillator();

    const gain = audioCtx.createGain();

    osc.connect(gain);

    gain.connect(audioCtx.destination);

    osc.frequency.value = freq;

    gain.gain.value = 0.1;

    osc.start();

    osc.stop(audioCtx.currentTime + 0.15);
}

/* ================= CELEBRATE ================= */

function celebrate(){

    const celebration =
    document.getElementById('celebration');

    for(let i=0;i<20;i++){

        const confetti =
        document.createElement('div');

        confetti.className = 'confetti';

        confetti.style.left =
        Math.random()*100 + '%';

        confetti.style.background =
        ['#ff4f9a','#00c853','#0066ff','#ffd600','#ff6d00']
        [Math.floor(Math.random()*5)];

        celebration.appendChild(confetti);

        setTimeout(() => confetti.remove(),2000);
    }
}

</script>

</body>
</html>
