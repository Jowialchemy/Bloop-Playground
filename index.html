<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bloop Playground</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
}

body{
    font-family:'Fredoka One', cursive;
    overflow:hidden;
    background:linear-gradient(135deg,#FFE5E5 0%,#FFF0E5 25%,#FFFFE5 50%,#E5FFE5 75%,#E5F0FF 100%);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* ===== FLOATING BACKGROUND ===== */
.floating{
    position:fixed;
    font-size:2rem;
    opacity:0.15;
    animation:float 15s linear infinite;
    pointer-events:none;
}

@keyframes float{
    from{
        transform:translateY(110vh) rotate(0deg);
    }
    to{
        transform:translateY(-120vh) rotate(360deg);
    }
}

/* ===== BLOOP ===== */
.bloop-container{
    position:relative;
    width:120px;
    height:120px;
    margin:30px auto 20px;
    animation:bloopBounce 2s ease-in-out infinite;
}

.bloop{
    width:100%;
    height:100%;
    background:linear-gradient(145deg,#FF8E8E,#FF6B9D);
    border-radius:50%;
    position:relative;
}

.bloop-eye{
    position:absolute;
    width:22px;
    height:28px;
    background:white;
    border-radius:50%;
    top:35%;
}

.bloop-eye.left{left:25%;}
.bloop-eye.right{right:25%;}

.bloop-pupil{
    position:absolute;
    width:12px;
    height:16px;
    background:#333;
    border-radius:50%;
    top:30%;
    left:25%;
}

.bloop-mouth{
    position:absolute;
    width:30px;
    height:15px;
    border:3px solid #333;
    border-top:none;
    border-radius:0 0 30px 30px;
    bottom:25%;
    left:50%;
    transform:translateX(-50%);
}

@keyframes bloopBounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-12px);}
}

/* ===== TITLE ===== */
.title{
    font-size:2.4rem;
    color:#FF6B9D;
    margin-bottom:10px;
}

.subtitle{
    color:#777;
    margin-bottom:25px;
}

/* ===== GAMES ===== */
.games-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    width:92%;
    max-width:520px;
}

.game-card{
    aspect-ratio:1;
    border-radius:28px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

.game-card:hover{
    transform:scale(1.06);
}

.game-icon{
    font-size:3rem;
    margin-bottom:10px;
}

.game-card.bubble{
    background:linear-gradient(145deg,#A8E6CF,#7FDBDA);
}

.game-card.color{
    background:linear-gradient(145deg,#FFD3B6,#FFAAA5);
}

.game-card.shape{
    background:linear-gradient(145deg,#DCEDC1,#A8E6CF);
}

/* ===== GAME SCREEN ===== */
.game-screen{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#FFE5E5 0%,#E5F0FF 100%);
    display:none;
    flex-direction:column;
    z-index:100;
}

.game-screen.active{
    display:flex;
}

.game-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:rgba(255,255,255,0.6);
}

.back-btn{
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    background:white;
    font-size:1.5rem;
    cursor:pointer;
}

.score-display{
    background:white;
    padding:8px 18px;
    border-radius:20px;
}

/* ===== BUBBLE GAME ===== */
.bubble-area{
    flex:1;
    position:relative;
    overflow:hidden;
}

.bubble{
    position:absolute;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.6rem;
    cursor:pointer;
    animation:floatUp linear forwards;
}

@keyframes floatUp{
    from{
        transform:translateY(110vh);
    }
    to{
        transform:translateY(-200px);
    }
}

/* ===== COLOR GAME ===== */
.color-game-area{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:30px;
}

.target-display{
    width:150px;
    height:150px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:3rem;
}

.color-options{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.color-btn{
    width:90px;
    height:90px;
    border-radius:25px;
    border:5px solid white;
    cursor:pointer;
    font-size:2rem;
}

/* ===== SHAPE GAME ===== */
.shape-game-area{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:50px;
}

.shape-target{
    font-size:5rem;
}

.shape-options{
    display:flex;
    gap:25px;
}

.shape-piece{
    font-size:4rem;
    cursor:pointer;
}

/* ===== CELEBRATION ===== */
.celebration{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:200;
}

.confetti{
    position:absolute;
    width:12px;
    height:12px;
    border-radius:50%;
    animation:fall 2s linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-10vh);
        opacity:1;
    }
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}

@media(max-width:500px){

    .games-grid{
        gap:12px;
    }

    .game-icon{
        font-size:2.3rem;
    }

    .shape-piece{
        font-size:3rem;
    }

}
</style>
</head>

<body>

<!-- FLOATING BACKGROUND -->
<div class="floating" style="left:5%; animation-delay:0s;">⭐</div>
<div class="floating" style="left:25%; animation-delay:4s;">☁️</div>
<div class="floating" style="left:45%; animation-delay:2s;">🦋</div>
<div class="floating" style="left:70%; animation-delay:6s;">🌈</div>
<div class="floating" style="left:90%; animation-delay:1s;">🎈</div>

<!-- HOME -->
<div id="homeScreen">

    <div class="bloop-container">
        <div class="bloop">
            <div class="bloop-eye left">
                <div class="bloop-pupil"></div>
            </div>

            <div class="bloop-eye right">
                <div class="bloop-pupil"></div>
            </div>

            <div class="bloop-mouth"></div>
        </div>
    </div>

    <h1 class="title">Bloop Playground</h1>
    <p class="subtitle">Tap a game to play 🎮</p>

    <div class="games-grid">

        <div class="game-card bubble" onclick="startGame('bubble')">
            <div class="game-icon">🫧</div>
            <div>Bubble Pop</div>
        </div>

        <div class="game-card color" onclick="startGame('color')">
            <div class="game-icon">🎨</div>
            <div>Color Match</div>
        </div>

        <div class="game-card shape" onclick="startGame('shape')">
            <div class="game-icon">🔷</div>
            <div>Shape Sorter</div>
        </div>

    </div>
</div>

<!-- BUBBLE -->
<div id="bubbleGame" class="game-screen">

    <div class="game-header">
        <button class="back-btn" onclick="goHome()">←</button>
        <div>🫧 Bubble Pop</div>
        <div class="score-display">⭐ <span id="bubbleScore">0</span></div>
    </div>

    <div class="bubble-area" id="bubbleArea"></div>

</div>

<!-- COLOR -->
<div id="colorGame" class="game-screen">

    <div class="game-header">
        <button class="back-btn" onclick="goHome()">←</button>
        <div>🎨 Color Match</div>
        <div class="score-display">⭐ <span id="colorScore">0</span></div>
    </div>

    <div class="color-game-area">

        <div class="target-display" id="targetDisplay">❓</div>

        <div class="color-options" id="colorOptions"></div>

    </div>

</div>

<!-- SHAPE -->
<div id="shapeGame" class="game-screen">

    <div class="game-header">
        <button class="back-btn" onclick="goHome()">←</button>
        <div>🔷 Shape Sorter</div>
        <div class="score-display">⭐ <span id="shapeScore">0</span></div>
    </div>

    <div class="shape-game-area">

        <div class="shape-target" id="shapeTarget">❓</div>

        <div class="shape-options" id="shapeOptions"></div>

    </div>

</div>

<div class="celebration" id="celebration"></div>

<script>

/* ===== MUSIC ===== */

const musicTracks = [
    "assets/music/come-and-join.mp3",
    "assets/music/tom and jerry.mp3",
    "assets/music/ukulele-happiness.mp3",
    "assets/music/cheerful instrumental children.mp3"
];

let currentTrack = 0;

const bgMusic = new Audio();
bgMusic.volume = 0.3;

function startMusic(){

    bgMusic.src = musicTracks[currentTrack];

    bgMusic.play().catch(() => {});

}

bgMusic.addEventListener('ended', () => {

    currentTrack++;

    if(currentTrack >= musicTracks.length){
        currentTrack = 0;
    }

    bgMusic.src = musicTracks[currentTrack];
    bgMusic.play();

});

/* ===== SOUND EFFECTS ===== */

const AudioContextClass = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio(){

    if(!audioCtx){
        audioCtx = new AudioContextClass();
    }

    if(bgMusic.paused){
        startMusic();
    }

}

function playSound(type){

    initAudio();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if(type === "correct"){
        osc.frequency.value = 700;
    }else if(type === "wrong"){
        osc.frequency.value = 200;
    }else{
        osc.frequency.value = 500;
    }

    gain.gain.value = 0.2;

    osc.start();

    setTimeout(() => {
        osc.stop();
    }, 150);

}

/* ===== GAME STATE ===== */

let currentGame = null;

const scores = {
    bubble:0,
    color:0,
    shape:0
};

let bubbleInterval;

/* ===== NAVIGATION ===== */

function startGame(game){

    initAudio();

    currentGame = game;

    document.querySelectorAll('.game-screen')
    .forEach(screen => screen.classList.remove('active'));

    document.getElementById(game + 'Game')
    .classList.add('active');

    if(game === "bubble"){
        startBubbleGame();
    }

    if(game === "color"){
        startColorGame();
    }

    if(game === "shape"){
        startShapeGame();
    }

}

function goHome(){

    clearInterval(bubbleInterval);

    document.querySelectorAll('.game-screen')
    .forEach(screen => screen.classList.remove('active'));

}

/* ===== BUBBLE GAME ===== */

function startBubbleGame(){

    scores.bubble = 0;
    updateScore("bubble");

    const area = document.getElementById('bubbleArea');

    area.innerHTML = '';

    bubbleInterval = setInterval(() => {

        const bubble = document.createElement('div');

        bubble.className = 'bubble';

        const size = Math.random() * 50 + 60;

        bubble.style.width = size + 'px';
        bubble.style.height = size + 'px';

        bubble.style.left =
            Math.random() * (window.innerWidth - size) + 'px';

        bubble.style.background =
            ['#FF6B9D','#7FDBDA','#FFD93D','#A8E6CF'][Math.floor(Math.random()*4)];

        bubble.style.animationDuration =
            (Math.random() * 3 + 4) + 's';

        bubble.textContent =
            ['⭐','🫧','🌈','🍭'][Math.floor(Math.random()*4)];

        bubble.onclick = () => {

            playSound('correct');

            scores.bubble++;

            updateScore('bubble');

            bubble.remove();

            if(scores.bubble % 5 === 0){
                celebrate();
            }

        };

        area.appendChild(bubble);

        setTimeout(() => bubble.remove(),7000);

    },1000);

}

/* ===== COLOR GAME ===== */

const colorData = [

    {name:'red',hex:'#FF6B6B',emoji:'🔴'},
    {name:'blue',hex:'#4ECDC4',emoji:'🔵'},
    {name:'yellow',hex:'#FFD93D',emoji:'🟡'},
    {name:'green',hex:'#95E1D3',emoji:'🟢'}

];

let currentColor;

function startColorGame(){

    scores.color = 0;
    updateScore('color');

    nextColorRound();

}

function nextColorRound(){

    currentColor =
        colorData[Math.floor(Math.random()*colorData.length)];

    const target = document.getElementById('targetDisplay');

    target.style.background = currentColor.hex;
    target.textContent = currentColor.emoji;

    const options = document.getElementById('colorOptions');

    options.innerHTML = '';

    const shuffled =
        [...colorData].sort(() => Math.random() - 0.5);

    shuffled.forEach(color => {

        const btn = document.createElement('div');

        btn.className = 'color-btn';

        btn.style.background = color.hex;

        btn.textContent = color.emoji;

        btn.onclick = () => {

            if(color.name === currentColor.name){

                playSound('correct');

                scores.color++;

                updateScore('color');

                if(scores.color % 3 === 0){
                    celebrate();
                }

                nextColorRound();

            }else{

                playSound('wrong');

            }

        };

        options.appendChild(btn);

    });

}

/* ===== SHAPE GAME ===== */

const shapeData = [

    {name:'circle',emoji:'⭕'},
    {name:'square',emoji:'⬜'},
    {name:'triangle',emoji:'🔺'},
    {name:'star',emoji:'⭐'}

];

let currentShape;

function startShapeGame(){

    scores.shape = 0;

    updateScore('shape');

    nextShapeRound();

}

function nextShapeRound(){

    currentShape =
        shapeData[Math.floor(Math.random()*shapeData.length)];

    document.getElementById('shapeTarget')
    .textContent = currentShape.emoji;

    const options =
        document.getElementById('shapeOptions');

    options.innerHTML = '';

    const shuffled =
        [...shapeData].sort(() => Math.random() - 0.5);

    shuffled.forEach(shape => {

        const piece = document.createElement('div');

        piece.className = 'shape-piece';

        piece.textContent = shape.emoji;

        piece.onclick = () => {

            if(shape.name === currentShape.name){

                playSound('correct');

                scores.shape++;

                updateScore('shape');

                if(scores.shape % 3 === 0){
                    celebrate();
                }

                nextShapeRound();

            }else{

                playSound('wrong');

            }

        };

        options.appendChild(piece);

    });

}

/* ===== SCORE ===== */

function updateScore(game){

    document.getElementById(game + 'Score')
    .textContent = scores[game];

}

/* ===== CELEBRATION ===== */

function celebrate(){

    const celebration =
        document.getElementById('celebration');

    celebration.innerHTML = '';

    for(let i=0; i<25; i++){

        const confetti =
            document.createElement('div');

        confetti.className = 'confetti';

        confetti.style.left =
            Math.random() * 100 + '%';

        confetti.style.background =
            ['#FF6B9D','#7FDBDA','#FFD93D','#A8E6CF']
            [Math.floor(Math.random()*4)];

        celebration.appendChild(confetti);

    }

    setTimeout(() => {
        celebration.innerHTML = '';
    },2000);

}

</script>

</body>
</html>
