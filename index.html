<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bloop Playground</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:'Fredoka One',cursive;
overflow:hidden;
background:linear-gradient(135deg,#FFE5E5 0%,#FFF0E5 25%,#FFFFE5 50%,#E5FFE5 75%,#E5F0FF 100%);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

#homeScreen{
width:100%;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding-top:20px;
overflow:hidden;
}

.logo{
width:190px;
max-width:85%;
margin-top:15px;
margin-bottom:4px;
}

.title{
font-size:clamp(1.7rem,5vw,2.5rem);
color:#FF6B9D;
margin-bottom:3px;
text-align:center;
}

.subtitle{
font-size:1rem;
margin-bottom:15px;
color:#666;
}

.games-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
width:92%;
max-width:520px;
padding:10px;
margin-top:8px;
}

.game-card{
aspect-ratio:1;
border-radius:25px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 8px 20px rgba(0,0,0,0.12);
min-height:105px;
}

.game-card:hover{
transform:scale(1.05);
}

.game-card.bubble{
background:linear-gradient(145deg,#A8E6CF,#7FDBDA);
}

.game-card.color{
background:linear-gradient(145deg,#FFD3B6,#FFAAA5);
}

.game-card.shape{
background:linear-gradient(145deg,#C7CEEA,#B5EAD7);
}

.game-icon{
font-size:2.5rem;
margin-bottom:6px;
}

.game-label{
font-size:0.9rem;
color:white;
text-align:center;
}

.game-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
flex-direction:column;
background:linear-gradient(135deg,#FFE5E5,#E5F0FF);
}

.game-screen.active{
display:flex;
}

.game-header{
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.7);
}

.back-btn{
width:50px;
height:50px;
border:none;
border-radius:50%;
font-size:1.4rem;
background:white;
cursor:pointer;
}

.score-display{
background:white;
padding:8px 18px;
border-radius:20px;
}

.bubble-area{
flex:1;
position:relative;
overflow:hidden;
}

.bubble{
position:absolute;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:1.5rem;
animation:floatUp linear forwards;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

@keyframes floatUp{
from{transform:translateY(110vh);}
to{transform:translateY(-200px);}
}

.color-game-area,
.shape-game-area{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:30px;
padding:20px;
}

.target-display,
.shape-target{
width:150px;
height:150px;
border-radius:30px;
display:flex;
align-items:center;
justify-content:center;
font-size:4rem;
background:white;
}

.color-options,
.shape-options{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

.color-btn,
.shape-piece{
width:90px;
height:90px;
border-radius:25px;
display:flex;
align-items:center;
justify-content:center;
font-size:2.5rem;
cursor:pointer;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.celebration{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
display:none;
}

.celebration.active{
display:block;
}

.confetti{
position:absolute;
width:12px;
height:12px;
border-radius:50%;
animation:fall 2s linear forwards;
}

@keyframes fall{
from{transform:translateY(-10vh);opacity:1;}
to{transform:translateY(110vh);opacity:0;}
}

.instruction-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:0.3s;
}

.instruction-overlay.show{
opacity:1;
pointer-events:auto;
}

.instruction-card{
background:white;
padding:30px;
border-radius:25px;
text-align:center;
width:90%;
max-width:320px;
}

.start-btn{
margin-top:20px;
padding:14px 35px;
border:none;
border-radius:30px;
background:#FF6B9D;
color:white;
font-size:1.1rem;
cursor:pointer;
}
</style>

</head>
<body>

<div id="homeScreen">
<img src="images/bloop-logo.png" class="logo" alt="Bloop Logo">
<h1 class="title">Bloop Playground</h1>
<p class="subtitle">Tap a game to play!</p>

<div class="games-grid">
<div class="game-card bubble" onclick="startGame('bubble')">
<div class="game-icon">🫧</div>
<div class="game-label">Bubble Pop</div>
</div>

<div class="game-card color" onclick="startGame('color')">
<div class="game-icon">🎨</div>
<div class="game-label">Color Match</div>
</div>

<div class="game-card shape" onclick="startGame('shape')">
<div class="game-icon">🔷</div>
<div class="game-label">Shape Sorter</div>
</div>
</div>
</div>

<div id="bubbleGame" class="game-screen">
<div class="game-header">
<button class="back-btn" onclick="goHome()">←</button>
<div>🫧 Bubble Pop</div>
<div class="score-display">⭐ <span id="bubbleScore">0</span></div>
</div>
<div class="bubble-area" id="bubbleArea"></div>
</div>

<div id="colorGame" class="game-screen">
<div class="game-header">
<button class="back-btn" onclick="goHome()">←</button>
<div>🎨 Color Match</div>
<div class="score-display">⭐ <span id="colorScore">0</span></div>
</div>
<div class="color-game-area">
<div class="target-display" id="targetDisplay">❓</div>
<div class="color-options" id="colorOptions"></div>
</div>
</div>

<div id="shapeGame" class="game-screen">
<div class="game-header">
<button class="back-btn" onclick="goHome()">←</button>
<div>🔷 Shape Sorter</div>
<div class="score-display">⭐ <span id="shapeScore">0</span></div>
</div>
<div class="shape-game-area">
<div class="shape-target" id="shapeTarget">❓</div>
<div class="shape-options" id="shapeOptions"></div>
</div>
</div>

<div class="celebration" id="celebration"></div>

<div class="instruction-overlay" id="instructionOverlay">
<div class="instruction-card">
<div id="instIcon" style="font-size:4rem">🎮</div>
<div id="instText" style="margin-top:10px">Ready?</div>
<button class="start-btn" onclick="closeInstruction()">Let's Go!</button>
</div>
</div>

<script>
const AudioContext=window.AudioContext||window.webkitAudioContext;
let audioCtx;

const musicTracks=[
"assets/music/come-and-join.mp3",
"assets/music/tom and jerry.mp3",
"assets/music/ukulele-happiness.mp3",
"assets/music/cheerful instrumental children.mp3"
];

let currentTrack=0;
let bgMusic=new Audio();
bgMusic.volume=0.3;

bgMusic.addEventListener('ended',()=>{
currentTrack++;
if(currentTrack>=musicTracks.length){
currentTrack=0;
}
bgMusic.src=musicTracks[currentTrack];
bgMusic.play();
});

function startBackgroundMusic(){
bgMusic.src=musicTracks[currentTrack];
bgMusic.play().catch(()=>{});
}

function initAudio(){
if(!audioCtx) audioCtx=new AudioContext();
if(bgMusic.paused){
startBackgroundMusic();
}
}

function playSound(type){
initAudio();
const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();
osc.connect(gain);
gain.connect(audioCtx.destination);

if(type==='pop'){
osc.frequency.setValueAtTime(600,audioCtx.currentTime);
osc.frequency.exponentialRampToValueAtTime(1200,audioCtx.currentTime+0.1);
gain.gain.setValueAtTime(0.2,audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.15);
osc.start();
osc.stop(audioCtx.currentTime+0.15);
}
}

let currentGame=null;
let bubbleInterval;
let scores={bubble:0,color:0,shape:0};

const instructions={
bubble:{icon:'🫧',text:'Pop the bubbles!'},
color:{icon:'🎨',text:'Match the colors!'},
shape:{icon:'🔷',text:'Find the matching shape!'}
};

function startGame(game){
initAudio();
currentGame=game;
document.getElementById('homeScreen').style.display='none';
document.getElementById('instructionOverlay').classList.add('show');
document.getElementById('instIcon').textContent=instructions[game].icon;
document.getElementById('instText').textContent=instructions[game].text;
}

function closeInstruction(){
document.getElementById('instructionOverlay').classList.remove('show');
document.getElementById(currentGame+'Game').classList.add('active');

if(currentGame==='bubble') startBubbleGame();
if(currentGame==='color') startColorGame();
if(currentGame==='shape') startShapeGame();
}

function goHome(){
clearInterval(bubbleInterval);
document.querySelectorAll('.game-screen').forEach(screen=>{
screen.classList.remove('active');
});
document.getElementById('homeScreen').style.display='flex';
}

function updateScore(game){
document.getElementById(game+'Score').textContent=scores[game];
}

function startBubbleGame(){
const area=document.getElementById('bubbleArea');
area.innerHTML='';
scores.bubble=0;
updateScore('bubble');

const colors=['#FF6B9D','#7FDBDA','#FFD93D','#A8E6CF'];
const emojis=['🫧','⭐','🌈','🍭'];

bubbleInterval=setInterval(()=>{
const bubble=document.createElement('div');
bubble.className='bubble';

const size=Math.random()*40+60;
bubble.style.width=size+'px';
bubble.style.height=size+'px';
bubble.style.left=Math.random()*(window.innerWidth-size)+'px';
bubble.style.background=colors[Math.floor(Math.random()*colors.length)];
bubble.style.animationDuration='6s';
bubble.textContent=emojis[Math.floor(Math.random()*emojis.length)];

bubble.onclick=()=>{
playSound('pop');
scores.bubble++;
updateScore('bubble');
bubble.remove();
celebrate();
};

area.appendChild(bubble);
setTimeout(()=>bubble.remove(),7000);
},1200);
}

const colorData=[
{name:'red',hex:'#FF4D4D',emoji:'🔴'},
{name:'blue',hex:'#0066FF',emoji:'🔵'},
{name:'green',hex:'#00CC66',emoji:'🟢'},
{name:'yellow',hex:'#FFD93D',emoji:'🟡'}
];

let currentTargetColor=null;

function startColorGame(){
scores.color=0;
updateScore('color');
nextColorRound();
}

function nextColorRound(){
const target=colorData[Math.floor(Math.random()*colorData.length)];
currentTargetColor=target;

const display=document.getElementById('targetDisplay');
display.style.background=target.hex;
display.textContent=target.emoji;

const options=document.getElementById('colorOptions');
options.innerHTML='';

colorData.forEach(color=>{
const btn=document.createElement('div');
btn.className='color-btn';
btn.style.background=color.hex;
btn.textContent=color.emoji;
btn.onclick=()=>{
if(color.name===currentTargetColor.name){
scores.color++;
updateScore('color');
celebrate();
nextColorRound();
}
};
options.appendChild(btn);
});
}

const shapeData=[
{name:'circle',emoji:'⭕'},
{name:'star',emoji:'⭐'},
{name:'heart',emoji:'❤️'},
{name:'diamond',emoji:'🔷'}
];

let currentTargetShape=null;

function startShapeGame(){
scores.shape=0;
updateScore('shape');
nextShapeRound();
}

function nextShapeRound(){
const target=shapeData[Math.floor(Math.random()*shapeData.length)];
currentTargetShape=target;

const display=document.getElementById('shapeTarget');
display.textContent=target.emoji;

const options=document.getElementById('shapeOptions');
options.innerHTML='';

shapeData.forEach(shape=>{
const piece=document.createElement('div');
piece.className='shape-piece';
piece.textContent=shape.emoji;
piece.onclick=()=>{
if(shape.name===currentTargetShape.name){
scores.shape++;
updateScore('shape');
celebrate();
nextShapeRound();
}
};
options.appendChild(piece);
});
}

function celebrate(){
const celebration=document.getElementById('celebration');
celebration.classList.add('active');
celebration.innerHTML='';

for(let i=0;i<15;i++){
const confetti=document.createElement('div');
confetti.className='confetti';
confetti.style.left=Math.random()*100+'%';
confetti.style.background=['#FF6B9D','#FFD93D','#7FDBDA'][Math.floor(Math.random()*3)];
celebration.appendChild(confetti);
}

setTimeout(()=>{
celebration.classList.remove('active');
},1500);
}
</script>

</body>
</html>
