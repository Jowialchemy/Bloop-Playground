<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Bloop Playground</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:'Fredoka One', cursive;
    overflow:hidden;
    background:linear-gradient(135deg,#FFE5E5,#FFF6D6,#E5FFD9,#D9F1FF);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

/* ===== HOME ===== */

#homeScreen{
    width:100%;
    max-width:500px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px;
}

/* ===== LOGO ===== */

.logo-container{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:15px;
}

.bloop-logo{
    width:180px;
    max-width:75%;
    animation:floatLogo 3s ease-in-out infinite;
    filter:drop-shadow(0 10px 20px rgba(0,0,0,.2));
}

@keyframes floatLogo{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

.title{
    font-size:2.2rem;
    color:#ff5ea8;
    margin-bottom:8px;
}

.subtitle{
    color:#666;
    margin-bottom:25px;
    font-size:1rem;
}

/* ===== GAME GRID ===== */

.games-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:18px;
    width:100%;
}

.game-card{
    border-radius:25px;
    height:120px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:.25s;
    box-shadow:0 10px 20px rgba(0,0,0,.1);
}

.game-card:hover{
    transform:scale(1.05);
}

.game-icon{
    font-size:2.5rem;
    margin-bottom:8px;
}

.game-label{
    color:white;
    font-size:.9rem;
}

.bubble{
    background:linear-gradient(135deg,#72d6ff,#5ab7ff);
}

.color{
    background:linear-gradient(135deg,#ff8f8f,#ff6cab);
}

.shape{
    background:linear-gradient(135deg,#92e69b,#62d8c3);
}

/* ===== GAME SCREEN ===== */

.game-screen{
    position:fixed;
    inset:0;
    display:none;
    flex-direction:column;
    background:linear-gradient(135deg,#FFE5E5,#FFF6D6,#E5FFD9,#D9F1FF);
    z-index:10;
}

.game-screen.active{
    display:flex;
}

.game-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
}

.back-btn{
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    font-size:1.3rem;
    cursor:pointer;
}

.score-display{
    background:white;
    padding:10px 18px;
    border-radius:20px;
}

/* ===== BUBBLE GAME ===== */

.bubble-area{
    position:relative;
    flex:1;
    overflow:hidden;
}

.pop-bubble{
    position:absolute;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:1.5rem;
    cursor:pointer;
    animation:floatUp linear forwards;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-150px);
    }
}

/* ===== COLOR GAME ===== */

.color-game-area{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:30px;
}

.target-display{
    width:150px;
    height:150px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:3rem;
    color:white;
    box-shadow:0 10px 20px rgba(0,0,0,.15);
}

.color-options{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.color-btn{
    width:85px;
    height:85px;
    border-radius:20px;
    border:5px solid white;
    cursor:pointer;
}

/* ===== SHAPE GAME ===== */

.shape-game-area{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:40px;
}

.shape-target{
    width:140px;
    height:140px;
    border:5px dashed rgba(0,0,0,.2);
    border-radius:25px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:4rem;
}

.shape-options{
    display:flex;
    gap:20px;
}

.shape-piece{
    font-size:4rem;
    cursor:pointer;
}

/* ===== MOBILE ===== */

@media(max-width:500px){

    .game-card{
        height:105px;
    }

    .game-icon{
        font-size:2rem;
    }

    .game-label{
        font-size:.75rem;
    }

    .shape-piece{
        font-size:3rem;
    }

}

</style>
</head>

<body>

<!-- ===== HOME ===== -->

<div id="homeScreen">

    <div class="logo-container">
        <img src="images/bloop-logo.png" class="bloop-logo">
    </div>

    <h1 class="title">Bloop Playground</h1>

    <p class="subtitle">
        Tap a game to play!
    </p>

    <div class="games-grid">

        <div class="game-card bubble" onclick="startGame('bubble')">
            <div class="game-icon">🫧</div>
            <div class="game-label">Bubble Pop</div>
        </div>

        <div class="game-card color" onclick="startGame('color')">
            <div class="game-icon">🎨</div>
            <div class="game-label">Color Match</div>
        </div>

        <div class="game-card shape" onclick="startGame('shape')">
            <div class="game-icon">🔷</div>
            <div class="game-label">Shape Sorter</div>
        </div>

    </div>

</div>

<!-- ===== BUBBLE GAME ===== -->

<div id="bubbleGame" class="game-screen">

    <div class="game-header">
        <button class="back-btn" onclick="goHome()">←</button>
        <div>🫧 Bubble Pop</div>
        <div class="score-display">⭐ <span id="bubbleScore">0</span></div>
    </div>

    <div class="bubble-area" id="bubbleArea"></div>

</div>

<!-- ===== COLOR GAME ===== -->

<div id="colorGame" class="game-screen">

    <div class="game-header">
        <button class="back-btn" onclick="goHome()">←</button>
        <div>🎨 Color Match</div>
        <div class="score-display">⭐ <span id="colorScore">0</span></div>
    </div>

    <div class="color-game-area">

        <div class="target-display" id="targetDisplay"></div>

        <div class="color-options" id="colorOptions"></div>

    </div>

</div>

<!-- ===== SHAPE GAME ===== -->

<div id="shapeGame" class="game-screen">

    <div class="game-header">
        <button class="back-btn" onclick="goHome()">←</button>
        <div>🔷 Shape Sorter</div>
        <div class="score-display">⭐ <span id="shapeScore">0</span></div>
    </div>

    <div class="shape-game-area">

        <div class="shape-target" id="shapeTarget"></div>

        <div class="shape-options" id="shapeOptions"></div>

    </div>

</div>

<script>

/* ===== MUSIC ===== */

const musicTracks = [
    "assets/music/come-and-join.mp3",
    "assets/music/tom and jerry.mp3",
    "assets/music/ukulele-happiness.mp3",
    "assets/music/cheerful instrumental children.mp3"
];

let currentTrack = 0;

const bgMusic = new Audio();

bgMusic.volume = 0.3;

bgMusic.addEventListener("ended",()=>{

    currentTrack++;

    if(currentTrack >= musicTracks.length){
        currentTrack = 0;
    }

    bgMusic.src = musicTracks[currentTrack];

    bgMusic.play();

});

function startMusic(){

    bgMusic.src = musicTracks[currentTrack];

    bgMusic.play().catch(()=>{});

}

document.body.addEventListener("click",startMusic,{once:true});

/* ===== VOICE ===== */

function speak(text){

    const speech = new SpeechSynthesisUtterance(text);

    speech.pitch = 1.2;
    speech.rate = .95;
    speech.volume = 1;

    speechSynthesis.speak(speech);

}

/* ===== GAME ===== */

let scores = {
    bubble:0,
    color:0,
    shape:0
};

let bubbleInterval;

/* ===== NAV ===== */

function startGame(game){

    document.querySelectorAll(".game-screen").forEach(s=>{
        s.classList.remove("active");
    });

    document.getElementById(game + "Game").classList.add("active");

    if(game === "bubble"){
        startBubbleGame();
    }

    if(game === "color"){
        startColorGame();
    }

    if(game === "shape"){
        startShapeGame();
    }

}

function goHome(){

    document.querySelectorAll(".game-screen").forEach(s=>{
        s.classList.remove("active");
    });

    clearInterval(bubbleInterval);

}

/* ===== BUBBLE ===== */

function startBubbleGame(){

    const area = document.getElementById("bubbleArea");

    area.innerHTML = "";

    scores.bubble = 0;

    updateScore("bubble");

    bubbleInterval = setInterval(()=>{

        const bubble = document.createElement("div");

        bubble.className = "pop-bubble";

        const size = Math.random()*50 + 60;

        bubble.style.width = size + "px";
        bubble.style.height = size + "px";

        bubble.style.left =
            Math.random() * (window.innerWidth - size) + "px";

        bubble.style.background =
            `hsl(${Math.random()*360},80%,70%)`;

        bubble.style.animationDuration =
            (Math.random()*3 + 4) + "s";

        bubble.innerHTML = "⭐";

        bubble.onclick = ()=>{

            bubble.remove();

            scores.bubble++;

            updateScore("bubble");

            if(scores.bubble % 5 === 0){
                speak("Great job");
            }

        };

        area.appendChild(bubble);

        setTimeout(()=>{
            bubble.remove();
        },7000);

    },1000);

}

/* ===== COLOR ===== */

const colorData = [

{
    name:"red",
    hex:"#ff3b30",
    emoji:"🔴"
},

{
    name:"blue",
    hex:"#007aff",
    emoji:"🔵"
},

{
    name:"green",
    hex:"#34c759",
    emoji:"🟢"
},

{
    name:"yellow",
    hex:"#ffd60a",
    emoji:"🟡"
}

];

let currentColor;

function startColorGame(){

    scores.color = 0;

    updateScore("color");

    nextColor();

}

function nextColor(){

    const target =
        colorData[Math.floor(Math.random()*colorData.length)];

    currentColor = target;

    const display = document.getElementById("targetDisplay");

    display.style.background = target.hex;

    display.innerHTML = target.emoji;

    const options = document.getElementById("colorOptions");

    options.innerHTML = "";

    colorData.forEach(color=>{

        const btn = document.createElement("div");

        btn.className = "color-btn";

        btn.style.background = color.hex;

        btn.innerHTML = color.emoji;

        btn.onclick = ()=>{

            if(color.name === currentColor.name){

                scores.color++;

                updateScore("color");

                speak("Awesome");

                nextColor();

            }else{

                speak("Try again");

            }

        };

        options.appendChild(btn);

    });

}

/* ===== SHAPE ===== */

const shapes = ["⭐","❤️","🔷","🔺"];

let currentShape;

function startShapeGame(){

    scores.shape = 0;

    updateScore("shape");

    nextShape();

}

function nextShape(){

    currentShape =
        shapes[Math.floor(Math.random()*shapes.length)];

    document.getElementById("shapeTarget").innerHTML =
        currentShape;

    const options = document.getElementById("shapeOptions");

    options.innerHTML = "";

    shapes.forEach(shape=>{

        const piece = document.createElement("div");

        piece.className = "shape-piece";

        piece.innerHTML = shape;

        piece.onclick = ()=>{

            if(shape === currentShape){

                scores.shape++;

                updateScore("shape");

                speak("Great job");

                nextShape();

            }else{

                speak("Try again");

            }

        };

        options.appendChild(piece);

    });

}

/* ===== SCORE ===== */

function updateScore(game){

    document.getElementById(game + "Score").innerHTML =
        scores[game];

}

</script>

</body>
</html>
