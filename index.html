<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bloop Playground</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Fredoka',sans-serif;
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:
    radial-gradient(circle at top left,#420014,#000 40%),
    radial-gradient(circle at bottom right,#003d0f,#000 40%);
    color:white;
}

/* MAIN */
.container{
    width:100%;
    max-width:430px;
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* LOGO */
.logo{
    width:280px;
    max-width:90%;
    margin-top:30px;
    margin-bottom:18px;
    animation:float 3s ease-in-out infinite;
    filter:drop-shadow(0 0 25px rgba(255,255,255,0.25));
}

/* TITLE */
h1{
    color:#ff4fa3;
    font-size:4rem;
    line-height:0.95;
    margin-bottom:10px;
    text-shadow:0 4px 12px rgba(0,0,0,0.5);
}

/* SUBTITLE */
.subtitle{
    font-size:1.1rem;
    color:#ddd;
    margin-bottom:40px;
    font-weight:600;
}

/* GAME GRID */
.games{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:18px;
    width:100%;
    flex-wrap:nowrap;
    margin-top:0;
}

/* GAME CARD */
.game-card{
    width:115px;
    height:115px;
    border-radius:28px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:0.25s;
    box-shadow:0 0 25px rgba(255,255,255,0.08);
    user-select:none;
}

.game-card:hover{
    transform:translateY(-6px) scale(1.04);
}

.game-card:active{
    transform:scale(0.96);
}

.game-icon{
    font-size:3rem;
    margin-bottom:10px;
}

.game-name{
    font-size:0.9rem;
    font-weight:700;
    color:white;
}

/* COLORS */
.bubble{
    background:#001b4d;
}

.color{
    background:#4d0000;
}

.shape{
    background:#002800;
}

/* GAME SCREEN */
.game-screen{
    position:fixed;
    inset:0;
    background:#111;
    z-index:100;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.back-btn{
    position:absolute;
    top:20px;
    left:20px;
    background:#ff4fa3;
    border:none;
    color:white;
    padding:10px 18px;
    border-radius:14px;
    font-size:1rem;
    font-family:'Fredoka',sans-serif;
    cursor:pointer;
}

/* BUBBLES */
#bubbleArea{
    position:relative;
    width:100%;
    height:70vh;
}

.bubble-item{
    position:absolute;
    border-radius:50%;
    cursor:pointer;
    animation:popFloat 6s linear forwards;
}

/* COLOR GAME */
.color-options{
    display:grid;
    grid-template-columns:repeat(2,120px);
    gap:20px;
    margin-top:30px;
}

.color-box{
    width:120px;
    height:120px;
    border-radius:25px;
    cursor:pointer;
    border:5px solid white;
}

/* SHAPES */
.shape-options{
    display:flex;
    gap:20px;
    margin-top:40px;
}

.shape-item{
    width:100px;
    height:100px;
    background:#4da6ff;
    cursor:pointer;
}

.circle{
    border-radius:50%;
}

.diamond{
    transform:rotate(45deg);
}

/* ANIMATIONS */
@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0px);}
}

@keyframes popFloat{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

</style>
</head>
<body>

<div class="container">

    <!-- LOGO -->
    <img src="images/bloop-logo.png" class="logo">

    <!-- TITLE -->
    <h1>Bloop<br>Playground</h1>

    <!-- SUBTITLE -->
    <div class="subtitle">Tap a game to play!</div>

    <!-- GAMES -->
    <div class="games">

        <div class="game-card bubble" onclick="startBubbleGame()">
            <div class="game-icon">🫧</div>
            <div class="game-name">Bubble Pop</div>
        </div>

        <div class="game-card color" onclick="startColorGame()">
            <div class="game-icon">🎨</div>
            <div class="game-name">Color Match</div>
        </div>

        <div class="game-card shape" onclick="startShapeGame()">
            <div class="game-icon">🔷</div>
            <div class="game-name">Shape Sorter</div>
        </div>

    </div>

</div>

<!-- GAME SCREEN -->
<div class="game-screen" id="gameScreen">

    <button class="back-btn" onclick="closeGame()">← Back</button>

    <div id="gameContent"></div>

</div>

<script>

/* =========================
AUDIO
========================= */

const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;

const musicTracks = [
    "assets/music/come-and-join.mp3",
    "assets/music/tom and jerry.mp3",
    "assets/music/ukulele-happiness.mp3",
    "assets/music/cheerful instrumental children.mp3"
];

let currentTrack = 0;
let bgMusic = new Audio();

bgMusic.volume = 0.3;
bgMusic.loop = false;

bgMusic.addEventListener('ended', () => {
    currentTrack++;
    if(currentTrack >= musicTracks.length){
        currentTrack = 0;
    }
    bgMusic.src = musicTracks[currentTrack];
    bgMusic.play();
});

function startBackgroundMusic(){
    bgMusic.src = musicTracks[currentTrack];
    bgMusic.play().catch(()=>{});
}

function initAudio(){
    if(!audioCtx){
        audioCtx = new AudioContext();
    }

    if(bgMusic.paused){
        startBackgroundMusic();
    }
}

/* SOUND FX */

function playSound(type){

    initAudio();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if(type === "correct"){
        osc.frequency.value = 800;
    }else{
        osc.frequency.value = 300;
    }

    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
}

/* VOICE */

function speak(text){

    const speech = new SpeechSynthesisUtterance(text);

    speech.pitch = 1.4;
    speech.rate = 1;
    speech.volume = 1;

    window.speechSynthesis.speak(speech);
}

function praise(){

    const praises = [
        "Great job!",
        "Awesome!",
        "Fantastic!",
        "Nice work!",
        "Wonderful!",
        "Try again!"
    ];

    const random = praises[Math.floor(Math.random()*praises.length)];

    speak(random);
}

/* GAME SYSTEM */

const gameScreen = document.getElementById("gameScreen");
const gameContent = document.getElementById("gameContent");

function openGame(html){
    gameScreen.style.display = "flex";
    gameContent.innerHTML = html;
}

function closeGame(){
    gameScreen.style.display = "none";
    gameContent.innerHTML = "";
}

/* =========================
BUBBLE GAME
========================= */

function startBubbleGame(){

    openGame(`
        <h2 style="margin-bottom:20px;">Bubble Pop 🫧</h2>
        <div id="bubbleArea"></div>
    `);

    const area = document.getElementById("bubbleArea");

    const interval = setInterval(()=>{

        if(gameScreen.style.display === "none"){
            clearInterval(interval);
            return;
        }

        const bubble = document.createElement("div");

        bubble.className = "bubble-item";

        const size = Math.random()*70 + 40;

        bubble.style.width = size + "px";
        bubble.style.height = size + "px";

        bubble.style.left = Math.random()*80 + "%";

        bubble.style.background = `
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(173,216,230,0.4))
        `;

        bubble.onclick = () => {
            bubble.remove();
            playSound("correct");
            praise();
        };

        area.appendChild(bubble);

        setTimeout(()=>{
            bubble.remove();
        },6000);

    },900);
}

/* =========================
COLOR GAME
========================= */

function startColorGame(){

    const colors = [
        {name:"Blue",value:"#0066ff"},
        {name:"Green",value:"#00cc44"},
        {name:"Red",value:"#ff1a1a"},
        {name:"Yellow",value:"#ffd11a"}
    ];

    const target = colors[Math.floor(Math.random()*colors.length)];

    openGame(`
        <h2>Tap the ${target.name} Color</h2>

        <div class="color-options">

            ${colors.map(c=>`
                <div class="color-box"
                style="background:${c.value}"
                onclick="${c.name===target.name ? 'correctColor()':'wrongAnswer()'}">
                </div>
            `).join("")}

        </div>
    `);
}

function correctColor(){
    playSound("correct");
    praise();
}

function wrongAnswer(){
    playSound("wrong");
    speak("Try again!");
}

/* =========================
SHAPE GAME
========================= */

function startShapeGame(){

    openGame(`
        <h2>Tap the Circle</h2>

        <div class="shape-options">

            <div class="shape-item circle"
            onclick="correctShape()"></div>

            <div class="shape-item"
            onclick="wrongAnswer()"></div>

            <div class="shape-item diamond"
            onclick="wrongAnswer()"></div>

        </div>
    `);
}

function correctShape(){
    playSound("correct");
    praise();
}

document.body.addEventListener("click", initAudio, {once:true});

</script>

</body>
</html>
